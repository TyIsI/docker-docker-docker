name: Docker Docker Docker Docker Docker

on:
    push:
        branches:
            - "main"
            - "master"
            - "trunk"
        tags:
            - "v*"
    pull_request:
        branches:
            - "main"
            - "master"
            - "trunk"
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: read
    packages: write
    attestations: write
    id-token: write

jobs:
    docker-docker-matrix-docker-docker-docker:
        runs-on: ubuntu-latest

        outputs:
            flavours: ${{ steps.flavours.outputs.flavours }}

        steps:
            - name: Docker
              uses: actions/checkout@v6

            - name: Docker Docker
              id: flavours
              run: ./tools/generate-flavour-matrix-include.sh | tee -a $GITHUB_OUTPUT

            - name: Docker Docker
              run: cat "$GITHUB_OUTPUT"

    docker-docker-docker:
        runs-on: ubuntu-latest

        needs: docker-docker-matrix-docker-docker-docker

        strategy:
            matrix:
                flavour: ${{fromJson(needs.docker-docker-matrix-docker-docker-docker.outputs.flavours)}}

        steps:
            - name: Docker
              uses: actions/checkout@v6

            - name: Docker Docker
              uses: docker/setup-buildx-action@v4

            - name: Docker Docker Docker
              uses: docker/build-push-action@v7
              with:
                  file: ./images/${{ matrix.flavour }}/Dockerfile
                  context: ./images/${{ matrix.flavour }}/
                  tags: ghcr.io/tyisi/docker-docker-docker:${{ matrix.flavour }}
                  outputs: type=docker,dest=${{ runner.temp }}/build-${{ matrix.flavour }}.tar

            - name: Docker Docker Docker Docker
              uses: actions/upload-artifact@v7
              with:
                  name: build-${{ matrix.flavour }}
                  path: ${{ runner.temp }}/build-${{ matrix.flavour }}.tar

    docker-docker-docker-docker:
        runs-on: ubuntu-latest

        needs: [docker-docker-matrix-docker-docker-docker,docker-docker-docker]

        if: ${{ github.event_name != 'pull_request' }}

        strategy:
            matrix:
                flavour: ${{fromJson(needs.docker-docker-matrix-docker-docker-docker.outputs.flavours)}}

        steps:
            - name: Docker
              uses: docker/setup-buildx-action@v4

            - name: Docker Docker
              uses: actions/download-artifact@v8
              with:
                  name: build-${{ matrix.flavour }}
                  path: ${{ runner.temp }}

            - name: Docker Docker Docker
              run: docker load --input ${{ runner.temp }}/build-${{ matrix.flavour }}.tar

            - name: Docker Docker Docker Docker
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker Docker Docker Docker Docker
              run: docker push ghcr.io/tyisi/docker-docker-docker:${{ matrix.flavour }}
