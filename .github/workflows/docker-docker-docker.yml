name: Docker Docker Docker Docker Docker

on:
    push:
        branches:
            - "main"
            - "master"
            - "trunk"
        tags:
            - "v*"
    pull_request:
        branches:
            - "main"
            - "master"
            - "trunk"
    workflow_dispatch:

permissions:
    contents: read
    packages: write
    attestations: write
    id-token: write

jobs:
    docker-docker-docker:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                flavour: ["build-essential"]

        steps:
            - name: Docker
              uses: actions/checkout@v4

            - name: Docker Docker
              uses: docker/setup-buildx-action@v3

            - name: Docker Docker Docker
              uses: docker/build-push-action@v6
              with:
                  file: ./images/${{ matrix.flavour }}/Dockerfile
                  context: ./images/${{ matrix.flavour }}/
                  tags: ghcr.io/tyisi/docker-docker-docker:${{ matrix.flavour }}
                  outputs: type=docker,dest=${{ runner.temp }}/build-${{ matrix.flavour }}.tar

            - name: Docker Docker Docker Docker
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.flavour }}
                  path: ${{ runner.temp }}/build-${{ matrix.flavour }}.tar

    docker-docker-docker-docker:
        runs-on: ubuntu-latest

        needs: docker-docker-docker

        if: ${{ github.event_name != 'pull_request' }}

        strategy:
            matrix:
                flavour: ["build-essential"]

        steps:
            - name: Docker
              uses: docker/setup-buildx-action@v3

            - name: Docker Docker
              uses: actions/download-artifact@v4
              with:
                  name: build-${{ matrix.flavour }}
                  path: ${{ runner.temp }}

            - name: Docker Docker Docker
              run: docker load --input ${{ runner.temp }}/build-${{ matrix.flavour }}.tar

            - name: Docker Docker Docker Docker
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker Docker Docker Docker Docker
              run: docker push ghcr.io/tyisi/docker-docker-docker:${{ matrix.flavour }}
